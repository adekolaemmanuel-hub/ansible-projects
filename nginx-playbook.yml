---
- name: Install and configure nginx
  hosts: local
  become: yes

  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start nginx service
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Create custom index page
      copy:
        content: "<h1>Deployed by Ansible</h1>"
        dest: /var/www/html/index.html

    - name: Confirm nginx is running
      debug:
        msg: "Nginx is installed and running"
